services:
  visual-assessment-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: visual-damage-assessment-api
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VDA_VISION_MODEL=${VDA_VISION_MODEL:-gemma-4-31b}
      - VDA_SERVICE_API_KEY=${VDA_SERVICE_API_KEY}
      - VDA_REQUIRE_AUTH=${VDA_REQUIRE_AUTH:-true}
      - VDA_ALLOWED_ORIGINS=${VDA_ALLOWED_ORIGINS:-}
    restart: unless-stopped
    networks:
      - assessment-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  assessment-network:
    driver: bridge