version: '3.8'

services:
  visual-assessment-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: visual-damage-assessment-api
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - assessment-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  assessment-network:
    driver: bridge