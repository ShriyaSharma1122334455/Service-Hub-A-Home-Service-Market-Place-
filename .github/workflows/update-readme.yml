name: Auto-Update README Changelog

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  update-readme:
    if: |
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'docs: update changelog')) ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ steps.app-token.outputs.token }}

      - name: Gather commit info
        id: info
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          COMMIT_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          DIFF_STAT=$(git diff --stat HEAD~1 HEAD 2>/dev/null || echo "Initial commit")
          CODE_DIFF=$(git diff HEAD~1 HEAD -- '*.md' '*.py' '*.ts' '*.js' '*.go' '*.rs' 2>/dev/null | head -c 4000 || echo "")

          echo "$COMMIT_MSG"  > /tmp/commit_msg.txt
          echo "$DIFF_STAT"   > /tmp/diff_stat.txt
          echo "$CODE_DIFF"   > /tmp/code_diff.txt

          echo "sha=${GITHUB_SHA:0:7}"   >> $GITHUB_OUTPUT
          echo "author=$COMMIT_AUTHOR"   >> $GITHUB_OUTPUT
          echo "date=$COMMIT_DATE"       >> $GITHUB_OUTPUT

      - name: Generate changelog entry via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          COMMIT_MSG=$(cat /tmp/commit_msg.txt)
          DIFF_STAT=$(cat /tmp/diff_stat.txt)
          CODE_DIFF=$(cat /tmp/code_diff.txt)
          README_TAIL=$(tail -c 2000 README.md 2>/dev/null || echo "No README yet")

          PAYLOAD=$(jq -n \
            --arg msg "$COMMIT_MSG" \
            --arg stat "$DIFF_STAT" \
            --arg diff "$CODE_DIFF" \
            --arg readme "$README_TAIL" \
            '{
              contents: [{
                parts: [{
                  text: ("You are a technical writer. Based on the git info below, write a single concise changelog entry (3-5 sentences). Plain markdown only — no heading, no date, just the paragraph.\n\nCommit: " + $msg + "\n\nFiles changed:\n" + $stat + "\n\nDiff excerpt:\n```\n" + $diff + "\n```\n\nREADME tail:\n" + $readme)
                }]
              }],
              generationConfig: { maxOutputTokens: 400 }
            }')

          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "=== Gemini Raw Response ==="
          echo "$RESPONSE"
          echo "=== Gemini Raw Response ==="

          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          if [ -n "$ERROR" ]; then
            echo "Gemini API Error: $ERROR"
            exit 1
          fi

          ENTRY=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Changelog generation failed."')
          echo "$ENTRY" > /tmp/changelog_entry.txt

      - name: Append changelog to README
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          SHA="${{ steps.info.outputs.sha }}"
          AUTHOR="${{ steps.info.outputs.author }}"
          ENTRY=$(cat /tmp/changelog_entry.txt)

          [ -f README.md ] || echo "# Project README" > README.md

          cat >> README.md << EOF

          ---

          ### 🔄 Changelog — ${DATE} (\`${SHA}\`)
          **Author:** ${AUTHOR}

          ${ENTRY}
          EOF

      - name: Open PR and auto-merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          DATE=$(date -u +"%Y%m%d%H%M%S")
          BRANCH="docs/readme-update-${DATE}"

          git config user.name "readme-bot[bot]"
          git config user.email "readme-bot[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add README.md

          # Exit cleanly if nothing changed
          git diff --staged --quiet && echo "No changes to commit" && exit 0

          git commit -m "docs: update changelog [skip ci]"
          git push origin "$BRANCH"

          gh pr create \
            --title "docs: auto-update README changelog" \
            --body "Automated changelog for commit \`${{ steps.info.outputs.sha }}\`." \
            --base main \
            --head "$BRANCH"

          gh pr merge "$BRANCH" --squash --auto --delete-branch
