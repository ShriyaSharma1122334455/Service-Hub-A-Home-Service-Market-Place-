name: CI – Build & Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # 1. Backend
  # ─────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      PORT: 3000
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      FROM_EMAIL: ${{ vars.FROM_EMAIL }}
      FROM_NAME: ${{ vars.FROM_NAME }}
      SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}
      CORS_ORIGIN: http://localhost:5173
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Lint
        run: npm run lint --if-present
        working-directory: backend

      - name: Build
        run: npm run build --if-present
        working-directory: backend

      - name: Run tests
        run: npm test
        working-directory: backend

  # ─────────────────────────────────────────
  # 2. Frontend
  # ─────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      VITE_API_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint --if-present
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ─────────────────────────────────────────
  # 3. AI Service
  # ─────────────────────────────────────────
  ai-services:
    name: AI Service CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: ai-services/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ai-services

      - name: Lint
        run: flake8 .
        working-directory: ai-services

      - name: Run tests
        run: pytest
        working-directory: ai-services

  # Visual Damage Assessment CI removed — service directory does not exist in
  # this repo yet. Re-add this job when visual-damage-assessment-service/ is committed.
