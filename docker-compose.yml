# ServiceHub — Monorepo Docker Compose
# ──────────────────────────────────────
# Runs ALL services together locally.
#
# Usage:
#   docker compose up --build          # Start everything
#   docker compose up backend          # Start only backend
#   docker compose logs -f backend     # Tail logs
#
# Environment variables:
#   Each service reads its own .env file directly — no root .env needed.
#   backend/          → backend/.env
#   frontend/         → frontend/.env
#   visual-damage-assessment/ → visual-damage-assessment/.env
#
# Each service also has its own Dockerfile for independent deployment.

version: '3.9'

services:

  # ── Express.js Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development            # multi-stage: dev or production
    container_name: servicehub-backend
    image: servicehub-backend:local
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env               # reads MONGODB_URI, SUPABASE_*, CLOUDINARY_*, etc.
    environment:
      - NODE_ENV=${NODE_ENV:-development}   # override NODE_ENV only if needed
      - PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - ./backend:/app               # hot reload in dev
      - /app/node_modules            # preserve container node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - servicehub-network

  # ── React Frontend ──────────────────────────────────────────────────────────
   frontend:
     build:
      context: ./frontend
       dockerfile: Dockerfile
     container_name: servicehub-frontend
     image: servicehub-frontend:local
     ports:
       - "5173:5173"
     env_file:
       - ./frontend/.env              # reads VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, etc.
     environment:
       - VITE_API_URL=http://localhost:3000   # always points to local backend
     volumes:
       - ./frontend:/app
       - /app/node_modules
     depends_on:
       backend:
         condition: service_healthy
     networks:
       - servicehub-network

  # ── Visual Damage Assessment (Python/FastAPI) ───────────────────────────────
  visual-assessment:
    build:
      context: ./visual-damage-assessment
      dockerfile: Dockerfile
    container_name: servicehub-visual-assessment
    image: servicehub-visual-assessment:local
    ports:
      - "8000:8000"
    env_file:
      - ./visual-damage-assessment/.env    # reads GROQ_API_KEY
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - servicehub-network

  # ── User Verification (Python/FastAPI) ─────────────────────────────────────
  # Uncomment when service is ready
  # user-verification:
  #   build:
  #     context: ./user-verification
  #     dockerfile: Dockerfile
  #   container_name: servicehub-user-verification
  #   image: servicehub-user-verification:local
  #   ports:
  #     - "8001:8001"
  #   env_file:
  #     - ./user-verification/.env
  #   networks:
  #     - servicehub-network

networks:
  servicehub-network:
    driver: bridge

volumes:
  backend_modules:
  frontend_modules: